<!DOCTYPE html>
<html>
<head>
<title>Student Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0b1220);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

.bg-glow{
position:fixed;
width:380px;
height:380px;
background:radial-gradient(circle, rgba(0,229,255,0.22), transparent 65%);
top:-60px;
right:-60px;
filter:blur(18px);
animation:float1 6s ease-in-out infinite;
}
.bg-glow.two{
left:-80px;
bottom:-80px;
top:auto;
right:auto;
background:radial-gradient(circle, rgba(0,255,166,0.18), transparent 65%);
animation:float2 7s ease-in-out infinite;
}

.container{
position:relative;
z-index:2;
background:rgba(30,41,59,0.9);
backdrop-filter:blur(10px);
padding:30px;
border-radius:18px;
width:90%;
max-width:390px;
text-align:center;
box-shadow:0 14px 30px rgba(0,0,0,0.35);
animation:fadeUp 0.8s ease;
}

h2{
margin-bottom:6px;
color:#00e5ff;
font-size:28px;
}

.sub{
opacity:0.8;
font-size:14px;
margin-bottom:18px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
background:#0f172a;
color:white;
box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);
}

button{
width:90%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00e5ff,#00ffa6);
font-weight:bold;
cursor:pointer;
transition:0.25s ease;
color:#07111d;
}

button:hover{
transform:translateY(-1px) scale(1.02);
opacity:0.95;
}

.status{
margin-top:16px;
font-size:14px;
opacity:0.95;
line-height:1.5;
min-height:42px;
}

.tip{
margin-top:10px;
font-size:12px;
opacity:0.7;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
@keyframes float1{
0%,100%{transform:translateY(0)}
50%{transform:translateY(16px)}
}
@keyframes float2{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-16px)}
}
</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="bg-glow two"></div>

<div class="container">
<h2>Student Login</h2>
<div class="sub">Enter the same name and mobile number every time.</div>

<input id="name" placeholder="Enter Your Name">
<input id="mobile" placeholder="Enter Mobile Number" maxlength="10" inputmode="numeric">

<button onclick="submitDetails()">Submit & Allow Location</button>

<p id="status" class="status"></p>
<div class="tip">Valid Indian mobile number is required. Login is allowed between 9:00 AM and 1:00 PM.</div>
</div>

<script>
window.onload = function(){
  let savedName = localStorage.getItem("studentName");
  let savedMobile = localStorage.getItem("studentMobile");

  if(savedName) document.getElementById("name").value = savedName;
  if(savedMobile) document.getElementById("mobile").value = savedMobile;
};

async function submitDetails(){
  let name = document.getElementById("name").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let statusEl = document.getElementById("status");

  if(name === "" || mobile === ""){
    alert("Please fill all details");
    return;
  }

  if(!/^[6-9][0-9]{9}$/.test(mobile)){
    statusEl.innerText = "Enter a valid 10-digit Indian mobile number.";
    return;
  }

  statusEl.innerText = "Requesting location permission...";

  navigator.geolocation.getCurrentPosition(async function(pos){
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    let coords = lat + "," + lon;

    localStorage.setItem("studentName", name);
    localStorage.setItem("studentMobile", mobile);

    statusEl.innerText = "Submitting details...";

    try{
      let res = await fetch('/student_login',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:"name="+encodeURIComponent(name)+"&mobile="+encodeURIComponent(mobile)+"&location="+encodeURIComponent(coords)
      });

      let data = await res.json();

      if(!res.ok || !data.success){
        statusEl.innerText = data.message || "Unable to submit details.";
        return;
      }

      statusEl.innerText = "Request submitted. Redirecting...";
      window.location.href = data.redirect;
    }catch(e){
      statusEl.innerText = "Server error. Please try again.";
    }

  }, function(){
    statusEl.innerText = "Location permission is required.";
    alert("Please allow location permission");
  },{
    enableHighAccuracy:true,
    timeout:10000,
    maximumAge:0
  });
}
</script>

</body>
</html>
