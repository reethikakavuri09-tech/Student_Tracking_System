<!DOCTYPE html>
<html>
<head>
<title>Login - Smart Student Tracking System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
}

/* Glass card */
.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:40px;
border-radius:15px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
text-align:center;
animation:fadeIn 1s ease;
}

/* Title */
.title{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
background:linear-gradient(90deg,#00e5ff,#00ffa6);
background-clip:text;
-webkit-background-clip:text;
color:transparent;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
outline:none;
box-sizing:border-box;
}

/* PASSWORD BOX */
.pass-box{
position:relative;
}

.eye{
position:absolute;
right:12px;
top:14px;
cursor:pointer;
}

/* BUTTON */
button{
padding:10px 16px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00e5ff,#00ffa6);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
width:auto;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

/* ERROR MESSAGE */
.error{
color:red;
margin-top:10px;
font-size:14px;
}

/* footer */
.footer{
margin-top:15px;
font-size:12px;
opacity:0.7;
}

/* animation */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>

</head>

<body>

<form method="POST" action="/admin" class="login-box">

<div class="title">Smart Student Tracking System</div>

<input type="text" name="username" placeholder="Enter Username" required>

<div class="pass-box">
<input type="password" id="password" name="password" placeholder="Enter Password" required>
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button type="submit">Login</button>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<div class="footer">
Secure Access Panel
</div>

</form>

<script>
function togglePassword(){
let p = document.getElementById("password");
p.type = (p.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
